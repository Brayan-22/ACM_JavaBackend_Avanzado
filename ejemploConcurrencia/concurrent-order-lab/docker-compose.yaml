version: "3.9"

services:
  order-orchestrator:
    build:
      context: .
      dockerfile: order-orchestrator/Dockerfile
    container_name: order-orchestrator
    ports:
      - "8080:8080"
    networks:
      - microservices-network
    environment:
      SERVER_PORT: 8080
      INVENTORY_BASE_URL: http://inventory-service:8081
      PAYMENT_BASE_URL: http://payment-service:8082
      CUSTOMER_VALIDATION_BASE_URL: http://customer-validation-service:8083
    depends_on:
      - inventory-service
      - payment-service
      - customer-validation-service

  inventory-service:
    build:
      context: .
      dockerfile: inventory-service/Dockerfile
    container_name: inventory-service
    ports:
      - "8081:8081"
    networks:
      - microservices-network
    environment:
      SERVER_PORT: 8081

  payment-service:
    build:
      context: .
      dockerfile: payment-service/Dockerfile
    container_name: payment-service
    ports:
      - "8082:8082"
    networks:
      - microservices-network
    environment:
      SERVER_PORT: 8082

  customer-validation-service:
    build:
      context: .
      dockerfile: customer-validation-service/Dockerfile
    container_name: customer-validation-service
    ports:
      - "8083:8083"
    networks:
      - microservices-network
    environment:
      SERVER_PORT: 8083
networks:
  microservices-network:
    driver: bridge