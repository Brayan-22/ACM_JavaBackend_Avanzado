spring:
  application:
    name: event-driven-design

  datasource:
    url: jdbc:h2:mem:edd_db
    driverClassName: org.h2.Driver
    username: sa
    password: password
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: true

  rabbitmq:
    host: localhost
    port: 5672
    username: user
    password: password
    listener:
      simple:
        retry:
          # Habilitar reintentos si el consumidor lanza una excepcion
          enabled: true
          initial-interval: 2000ms
          max-attempts: 3
          multiplier: 2.0

logging:
  level:
    com.acm.edd: INFO
    org.springframework.amqp: WARN
