server:
  port: 8084

spring:
  application:
    name: vertical-slice
  datasource:
    url: jdbc:h2:mem:verticaldb
    driverClassName: org.h2.Driver
    username: sa
    password: password
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
  h2:
    console:
      enabled: true
      path: /h2-console
