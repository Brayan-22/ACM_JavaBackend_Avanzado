spring:
  application:
    name: seguridad_avanzada_acm
  datasource:
    url: jdbc:h2:mem:securitydb
    driverClassName: org.h2.Driver
    username: sa
    password: password
  sql:
    init:
      mode: always
  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: true
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: true
    defer-datasource-initialization: true

server:
  port: 8080
